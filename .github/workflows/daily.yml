name: Daily ESPN Matchup Email

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Send daily matchup email
        run: python daily_matchup_email.py
        env:
          ESPN_LEAGUE_ID: ${{ secrets.ESPN_LEAGUE_ID }}
          ESPN_YEAR: ${{ secrets.ESPN_YEAR }}
          ESPN_TEAM_NAME: ${{ secrets.ESPN_TEAM_NAME }}
          SEND_TO_EMAIL: ${{ secrets.SEND_TO_EMAIL }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
